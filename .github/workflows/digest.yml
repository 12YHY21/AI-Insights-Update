name: AI Insights Update

on:
  schedule:
    - cron: "17 8 * * 1,5"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        type: choice
        options:
          - dry-run
          - collect-only
          - send
        default: dry-run

permissions:
  contents: write

concurrency:
  group: ai-insights-update
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect sources only
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'collect-only'
        run: python -m src.main --collect-only

      - name: Generate preview
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        run: python -m src.main --dry-run

      - name: Generate and send digest
        if: github.event_name == 'schedule' || inputs.mode == 'send'
        run: python -m src.main

      - name: Persist deduplication state
        if: success() && (github.event_name == 'schedule' || inputs.mode == 'send')
        run: |
          if git diff --quiet -- data/state.json; then
            echo "No state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: update digest state [skip ci]"
          git push

      - name: Upload preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-digest-${{ github.run_number }}
          path: output/latest_digest.md
          if-no-files-found: ignore
          retention-days: 14

