name: AI Insights Update

on:
  schedule:
    - cron: "17 8 * * 1"
      timezone: "Asia/Shanghai"
    - cron: "17 9 1 * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        type: choice
        options:
          - dry-run
          - collect-only
          - send
          - monthly-dry-run
          - monthly-send
        default: dry-run

concurrency:
  group: ai-insights-update
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      persist_state: ${{ steps.mode.outputs.persist_state }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "17 9 1 * *" ]; then
              mode="monthly-send"
            elif [ "$(TZ=Asia/Shanghai date +%d)" = "01" ]; then
              mode="skip"
            else
              mode="send"
            fi
          else
            mode="${{ inputs.mode }}"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          if [ "$mode" = "send" ] || [ "$mode" = "monthly-send" ]; then
            echo "persist_state=true" >> "$GITHUB_OUTPUT"
          else
            echo "persist_state=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r requirements.lock

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Collect sources only
        if: steps.mode.outputs.mode == 'collect-only'
        run: python -m src.main --collect-only

      - name: Generate preview
        if: steps.mode.outputs.mode == 'dry-run'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_RANK_MODEL: ${{ vars.DEEPSEEK_RANK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_SUMMARY_MODEL: ${{ vars.DEEPSEEK_SUMMARY_MODEL || 'deepseek-v4-pro' }}
        run: python -m src.main --dry-run

      - name: Generate and send digest
        if: steps.mode.outputs.mode == 'send'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          DEEPSEEK_RANK_MODEL: ${{ vars.DEEPSEEK_RANK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_SUMMARY_MODEL: ${{ vars.DEEPSEEK_SUMMARY_MODEL || 'deepseek-v4-pro' }}
        run: python -m src.main

      - name: Generate monthly review preview
        if: steps.mode.outputs.mode == 'monthly-dry-run'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_RANK_MODEL: ${{ vars.DEEPSEEK_RANK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_SUMMARY_MODEL: ${{ vars.DEEPSEEK_SUMMARY_MODEL || 'deepseek-v4-pro' }}
        run: python -m src.main --monthly --dry-run --current-month

      - name: Generate and send monthly review
        if: steps.mode.outputs.mode == 'monthly-send'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          DEEPSEEK_RANK_MODEL: ${{ vars.DEEPSEEK_RANK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_SUMMARY_MODEL: ${{ vars.DEEPSEEK_SUMMARY_MODEL || 'deepseek-v4-pro' }}
        run: python -m src.main --monthly

      - name: Upload resumable state and archives
        if: always() && (steps.mode.outputs.mode == 'send' || steps.mode.outputs.mode == 'monthly-send')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: persistence-${{ github.run_id }}
          path: |
            data/state.json
            digests/
            reports/
          if-no-files-found: error
          retention-days: 7

      - name: Upload preview and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: latest-digest-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 30

  persist:
    needs: digest
    if: always() && needs.digest.outputs.persist_state == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout latest main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download resumable state and archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: persistence-${{ github.run_id }}
          path: .persistence

      - name: Merge persistence files
        shell: bash
        run: |
          git pull --ff-only origin main
          cp .persistence/data/state.json data/state.json
          if [ -d .persistence/digests ]; then
            mkdir -p digests
            cp -R .persistence/digests/. digests/
          fi
          if [ -d .persistence/reports ]; then
            mkdir -p reports
            cp -R .persistence/reports/. reports/
          fi

      - name: Commit state with push retry
        shell: bash
        run: |
          git add data/state.json
          [ -d digests ] && git add digests
          [ -d reports ] && git add reports
          if git diff --cached --quiet; then
            echo "No persistence changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: persist digest delivery [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt failed; rebasing before retry"
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "Failed to persist digest state after three attempts"
          exit 1
